<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Катя ♥ Діма — гра-запрошення</title>
<style>
  :root{
    --terra:#1E4E8A; --sage:#3F7C77; --rose:#A8505F; --gold:#B58A2E;
    --bg:#EBEBE3; --surface:#F8F8F3; --ink:#1a1a24;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;touch-action:none}
  #rsvp-input{touch-action:auto}
  body{
    background:var(--ink);
    display:flex;align-items:center;justify-content:center;
    font-family:"Courier New",ui-monospace,monospace;
    overflow:hidden;
  }
  #stage{
    position:relative;
    height:100vh;height:100dvh;
    aspect-ratio:320/568;
    max-width:100vw;
    background:#000;
    user-select:none;-webkit-user-select:none;
    container-type:size;
    touch-action:none;
  }
  body{overscroll-behavior:none}
  canvas#game{
    position:absolute;inset:0;width:100%;height:100%;
    image-rendering:pixelated;image-rendering:crisp-edges;
  }
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .hidden{display:none !important}

  /* ---------- title screen ---------- */
  #title-screen{gap:4%;background:transparent}
  #title-screen h1{
    color:#fff;font-size:clamp(20px,5.2cqw,42px);letter-spacing:2px;
    text-shadow:3px 3px 0 var(--rose), 6px 6px 0 rgba(0,0,0,.6);
  }
  #title-screen .sub{color:#d8d4c4;font-size:clamp(10px,2.2cqw,17px);letter-spacing:1px}
  .menu{display:flex;flex-direction:column;gap:10px;width:min(70%,340px)}
  .btn{
    font-family:inherit;font-weight:bold;cursor:pointer;
    font-size:clamp(13px,2.8cqw,18px);letter-spacing:1px;
    padding:.7em 1em;color:#fff;background:#2b2b38;
    border:0;box-shadow:0 0 0 3px #000, inset 0 -4px 0 rgba(0,0,0,.35);
    text-transform:uppercase;
  }
  .btn:active{transform:translateY(2px);box-shadow:0 0 0 3px #000, inset 0 -2px 0 rgba(0,0,0,.35)}
  .btn.katya{background:var(--rose)} .btn.dima{background:var(--sage)} .btn.watch{background:var(--terra)}
  #title-screen .hint{color:#8a8878;font-size:clamp(8px,1.8cqw,13px)}

  /* ---------- dialogue ---------- */
  #dialog{
    position:absolute;left:2%;right:2%;bottom:2%;
    display:flex;gap:2.5%;align-items:center;
    background:var(--surface);
    border:3px solid var(--ink);
    box-shadow:0 0 0 3px var(--surface), 0 6px 0 rgba(0,0,0,.5);
    padding:2% 2.5%;
    min-height:15%;max-height:22%;
    cursor:pointer;
  }
  #portrait-wrap{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:3px}
  canvas#portrait{
    width:clamp(48px,16cqw,72px);height:clamp(48px,16cqw,72px);
    image-rendering:pixelated;border:3px solid var(--ink);background:#cfd6dd;
  }
  #dname{font-weight:bold;font-size:clamp(9px,2cqw,14px);color:var(--ink);letter-spacing:1px;text-transform:uppercase}
  #dtext{flex:1;color:var(--ink);font-size:clamp(13px,2.8cqw,19px);line-height:1.45;align-self:center;white-space:pre-wrap}
  #darrow{position:absolute;right:12px;bottom:6px;color:var(--rose);font-size:clamp(10px,2.4cqw,16px);animation:bob .6s steps(2) infinite}
  @keyframes bob{50%{transform:translateY(3px)}}
  .name-katya{color:var(--rose)!important} .name-dima{color:var(--sage)!important}

  /* ---------- touch controls ---------- */
  #controls{position:absolute;inset:0;pointer-events:none}
  .pad{
    position:absolute;bottom:4%;pointer-events:auto;
    width:clamp(54px,15cqw,84px);height:clamp(54px,15cqw,84px);
    background:rgba(248,248,243,.18);border:2px solid rgba(248,248,243,.5);
    color:rgba(255,255,255,.9);font-size:clamp(22px,6cqw,34px);font-family:inherit;
    display:flex;align-items:center;justify-content:center;border-radius:8px;
  }
  .pad:active{background:rgba(248,248,243,.4)}
  #pad-left{left:2%} #pad-right{left:calc(2% + clamp(62px,17cqw,94px))}
  #pad-a{right:2%;border-radius:50%;background:rgba(168,80,95,.35);border-color:rgba(168,80,95,.75)}
  #pad-down{right:calc(2% + clamp(62px,17cqw,94px))}

  /* ---------- HUD / hints ---------- */
  #hud{position:absolute;top:2.5%;left:2.5%;color:#fff;font-size:clamp(9px,2cqw,14px);letter-spacing:1px;text-shadow:2px 2px 0 #000}
  #watch-hint{
    position:absolute;top:2.5%;left:50%;transform:translateX(-50%);
    color:#ffd;font-size:clamp(8px,1.9cqw,13px);white-space:nowrap;
    background:rgba(0,0,0,.55);padding:.4em .7em;border:2px solid rgba(255,255,255,.3);
  }
  #watch-play{
    position:absolute;top:2.2%;right:2.5%;
    pointer-events:auto;cursor:pointer;
    color:#fff;font-family:inherit;font-weight:bold;letter-spacing:1px;
    font-size:clamp(10px,2.3cqw,15px);padding:.45em 1em;
    background:var(--rose);border:0;box-shadow:0 0 0 3px #000, inset 0 -4px 0 rgba(0,0,0,.35);
  }
  #watch-play:active{transform:translateY(2px)}
  @keyframes blink{50%{opacity:.55}}
  #pause-btn{
    position:absolute;top:2.5%;right:2.5%;cursor:pointer;
    color:#fff;font-size:clamp(14px,3.4cqw,22px);
    background:rgba(0,0,0,.55);padding:.15em .45em;
    border:2px solid rgba(255,255,255,.35);user-select:none;
  }
  #kbd-hint{position:absolute;bottom:2.5%;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.55);font-size:clamp(8px,1.8cqw,12px);letter-spacing:1px;text-shadow:1px 1px 0 #000}

  /* ---------- семплер ---------- */
  #sampler-screen{background:#14121c;gap:2.2%;padding:2%}
  .s-head{color:#fff;font-weight:bold;font-size:clamp(11px,2.6cqw,18px);letter-spacing:1px;text-align:center}
  .s-head span{display:block;color:#8a8878;font-weight:normal;font-size:clamp(8px,1.8cqw,12px);margin-top:2px}
  #s-grid{
    display:grid;gap:2px;
    grid-template-columns:auto repeat(16,1fr);
    width:min(94%,700px);
  }
  .s-label{color:#8a8878;font-size:clamp(7px,1.6cqw,11px);align-self:center;padding-right:4px;text-align:right}
  .s-cell{
    aspect-ratio:1;background:#2b2b38;border:1px solid #3c3a4a;cursor:pointer;border-radius:2px;
  }
  .s-cell.on{background:var(--rose);border-color:#d98a96}
  .s-cell.col-now{filter:brightness(1.6)}
  .s-cell:nth-child(17n+6), .s-cell:nth-child(17n+10), .s-cell:nth-child(17n+14){border-left:2px solid #55515f}
  .s-controls{display:flex;gap:8px}
  .s-btn{font-size:clamp(10px,2.2cqw,15px);padding:.4em .9em}
  #s-play{background:var(--sage)} #s-code{background:var(--terra)} #s-back{background:#55515f}

  /* ---------- end screen ---------- */
  #end-screen{background:rgba(12,12,20,.94);gap:14px;padding:5%}
  #end-screen .big{color:#fff;font-size:clamp(16px,4.4cqw,34px);letter-spacing:2px;text-shadow:3px 3px 0 var(--sage)}
  #end-screen .date{color:var(--gold);font-size:clamp(12px,3cqw,22px);letter-spacing:2px}
  #end-screen p{color:#c9c4b4;font-size:clamp(9px,2.1cqw,15px);max-width:80%;line-height:1.6}
</style>
</head>
<body>
<div id="stage">
  <canvas id="game" width="320" height="568"></canvas>


  <div id="hud" class="hidden"></div>
  <div id="watch-hint" class="hidden">🍿 РЕЖИМ ПЕРЕГЛЯДУ</div>
  <button id="watch-play" class="hidden">▶ ГРАТИ САМ</button>
  <div id="pause-btn" class="hidden">⏸</div>
  <div id="kbd-hint" class="hidden">← → ходити &nbsp;·&nbsp; ПРОБІЛ — стрибок</div>

  <div id="dialog" class="hidden">
    <div id="portrait-wrap">
      <canvas id="portrait" width="32" height="32"></canvas>
      <div id="dname"></div>
    </div>
    <div id="dtext"></div>
    <div id="darrow" class="hidden">▼</div>
  </div>

  <div id="controls" class="hidden">
    <div class="pad" id="pad-left">◀</div>
    <div class="pad" id="pad-right">▶</div>
    <div class="pad hidden" id="pad-down">▼</div>
    <div class="pad" id="pad-a">A</div>
  </div>

  <div id="title-screen" class="overlay">
    <h1>КАТЯ ♥ ДІМА</h1>
    <div class="sub">шлях до весілля · 06.09.2026 · Київ</div>
    <div class="menu">
      <button class="btn katya" data-pov="katya">Грати за Катю</button>
      <button class="btn dima" data-pov="dima">Грати за Діму</button>
      <button class="btn watch" data-pov="watch">🍿 Просто подивитись</button>
      <button class="btn" id="btn-sampler">🎹 Семплер</button>
    </div>
    <div class="hint">— «Зйомка» → «Тіндер» → «Пейзажка» → «Лондон» → «Сватання» → «Мінімаліст» —</div>
    <div id="ach-btn" style="color:#B58A2E;cursor:pointer;font-size:clamp(10px,2.2cqw,14px);letter-spacing:1px">🏆 0/8</div>
  </div>

  <div id="ach-screen" class="overlay hidden" style="background:#14121c;gap:2%">
    <div class="s-head">🏆 ДОСЯГНЕННЯ</div>
    <div id="ach-list" style="display:flex;flex-direction:column;gap:6px;width:min(88%,420px)"></div>
    <button class="btn s-btn" id="ach-back" style="background:#55515f">НАЗАД</button>
  </div>

  <div id="sampler-screen" class="overlay hidden">
    <div class="s-head">🎹 СЕМПЛЕР <span>накидай мелодію — «КОД» скопіює її для гри</span></div>
    <div id="s-grid"></div>
    <div class="s-controls">
      <button class="btn s-btn" id="s-play">▶</button>
      <button class="btn s-btn" id="s-clear">ЧИСТКА</button>
      <button class="btn s-btn" id="s-code">КОД</button>
      <button class="btn s-btn" id="s-back">НАЗАД</button>
    </div>
  </div>

  <div id="end-screen" class="overlay hidden">
    <div class="big" id="inv-title">ЗАПРОШЕННЯ</div>
    <div class="date">06 · 09 · 2026 — КИЇВ</div>
    <p id="inv-body"></p>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      <button class="btn" id="btn-rsvp" style="background:var(--rose)">✍️ Відповісти</button>
      <button class="btn" id="btn-ics" style="background:var(--gold)">📅 В календар</button>
      <button class="btn" id="btn-restart">На початок</button>
    </div>
  </div>

  <div id="rsvp-screen" class="overlay hidden">
    <div class="s-head" id="rsvp-q">?</div>
    <div class="menu" id="rsvp-opts"></div>
    <input id="rsvp-input" class="hidden" type="text" maxlength="60" placeholder="напиши тут…"
      style="font-family:inherit;font-size:16px;padding:.6em;width:min(80%,340px);
             background:#f8f8f3;border:3px solid #000;color:#1a1a24">
    <div id="rsvp-dots" style="color:#8a8878;font-size:12px;letter-spacing:4px"></div>
    <pre id="rsvp-summary" class="hidden"
      style="color:#c9c4b4;font-size:clamp(9px,2cqw,13px);text-align:left;line-height:1.6;max-width:85%;white-space:pre-wrap"></pre>
  </div>
</div>

<script>
'use strict';
/* ============================================================
   КАТЯ ♥ ДІМА — гра-запрошення. Прототип v2.
   Сцена 1: знімальний майданчик, 2021 (шоу, яке не вийшло).
   Сцена 2: Тіндер, серпень 2022 — свайп, метч, перший чат.
   Тексти — чернетка (частина з реальної переписки),
   чекають схвалення Каті (game_shortlist.md).
   ============================================================ */

const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;

const W = 320, H = 568;          // портретна канва (9:16), на весь екран телефона
const LEVEL_W = 560;
const FLOOR_Y = 420;             // рівень підлоги — над діалоговим вікном
const GY = FLOOR_Y - 152;        // зсув «підлого-прив'язаного» декору вниз (стара підлога була 152)

const COL = {
  ink:'#1a1a24', skin:'#e8b08a', skinSh:'#c98f6c',
  rose:'#A8505F', roseD:'#7d3a46', sage:'#3F7C77', sageD:'#2c5a56',
  gold:'#B58A2E', terra:'#1E4E8A',
  hairK:'#5a3a26', hairD:'#2e2620',
  jeans:'#3a4a66', jeansD:'#2c3950',
  studioWall:'#34303f', studioWallD:'#28242f', floor:'#6b6775', floorD:'#5a5665',
  green:'#3fae54', greenD:'#2f8a41',
  metal:'#8b8898', white:'#f0ede4',
};

/* ---------------- гості: персональні посилання ----------------
   ?guest=КОД → ім'я, група часу і версія контенту.
   ?v=family → цензурна версія без коду.
   Реальні коди і час/локації Катя дасть пізніше — поки демо. */
const PARAMS = new URLSearchParams(location.search);
const GUESTS = {
  'demo':   {name:'Любий госте', slot:'A', family:false},
  'family': {name:'Рідні',       slot:'B', family:true},
};
const GUEST = GUESTS[(PARAMS.get('guest')||'').toLowerCase()] || null;
const CENSORED = GUEST ? GUEST.family : PARAMS.get('v')==='family';
const SLOTS = {
  A: {what:'Церемонія і банкет', when:'6 вересня 2026 · час уточнюється', where:'Київ · локація уточнюється'},
  B: {what:'Банкет',             when:'6 вересня 2026 · час уточнюється', where:'Київ · локація уточнюється'},
};

/* ---------------- досягнення 🏆 ---------------- */
const ACHS = [
  {id:'dubl3',  icon:'🎬', title:'Дубль три',        desc:'пережити зйомку Штормнадо'},
  {id:'storm',  icon:'💡', title:'Шторм зібрано',    desc:'усі ідеї на майданчику'},
  {id:'hearts', icon:'💘', title:'Всі серця твої',   desc:'усі сердечка на Пейзажці'},
  {id:'harbuz', icon:'🎃', title:'Гарбузова душа',   desc:'спіймати гарбуза на сватанні'},
  {id:'purr',   icon:'🐈', title:'Мурчальниця',      desc:'погладити Кітану'},
  {id:'mate1',  icon:'♛',  title:'Гросмейстерка',    desc:'мат із першої спроби'},
  {id:'ring',   icon:'💍', title:'Той самий палець', desc:'обрати підмізинний одразу'},
  {id:'both',   icon:'👀', title:'Обидві сторони',   desc:'пройти за Катю і за Діму'},
  {id:'konami', icon:'🎮', title:'↑↑↓↓←→←→BA',      desc:'згадати старий код'},
  {id:'flappy', icon:'🐈', title:'Котолов',          desc:'покликати Кітану нявканням'},
  {id:'egg',    icon:'🥚', title:'Слідопит',         desc:'знайти приховану пасхалку'},
];
let achDone = new Set(JSON.parse(localStorage.getItem('wed-ach')||'[]'));
const achToasts = [];
function achUnlock(id){
  if(game.watch || achDone.has(id)) return;
  achDone.add(id);
  localStorage.setItem('wed-ach', JSON.stringify([...achDone]));
  const a = ACHS.find(x=>x.id===id);
  achToasts.push({text: a.icon+' '+a.title, t: 170});
  updateAchButton();
}
function drawAchToasts(){
  achToasts.forEach((tt,i)=>{
    tt.t--;
    const y = 6 + i*16 - (tt.t>150 ? (tt.t-150)*2 : 0);
    ctx.fillStyle = 'rgba(0,0,0,.75)';
    ctx.fillRect(W/2-70, y, 140, 13);
    ctx.fillStyle = COL.gold; ctx.font='bold 8px monospace'; ctx.textAlign='center';
    ctx.fillText('🏆 '+tt.text, W/2, y+10);
    ctx.textAlign='left';
  });
  for(let i=achToasts.length-1;i>=0;i--) if(achToasts[i].t<=0) achToasts.splice(i,1);
}

const CHARS = {
  // Катя — блондинка з каре, Діма — шатен із чубчиком-шторкою (за фото)
  katya:{ name:'КАТЯ', hair:'#cfa96f', top:COL.rose, topD:COL.roseD, cls:'name-katya', style:'bob'    },
  dima: { name:'ДІМА', hair:'#4a3423', top:COL.sage, topD:COL.sageD, cls:'name-dima',  style:'fringe' },
  starosta:{ name:'СТАРОСТА', hair:'#9a9488', top:'#7a5c3e', topD:'#5f462e', cls:'', style:'fringe' },
  // креативник-напарник у кадрі Штормнадо (2021)
  guy:{ name:'КРЕАТИВНИК', hair:'#2e2a26', top:'#3a4a5a', topD:'#2a3644', cls:'', style:'fringe' },
};
// Діма зразка Штормнадо-2021: мілірований блонд, сорочка
const DIMA_2021 = {hair:'#6a5236', hi:'#e0cc94', top:'#e8e4da', topD:'#c9c4b4', style:'fringe'};

/* ---------------- сценарії ----------------
   Один скрипт — і для гри, і для автопроходження. */
function setScript(pov){
  // ПОВ реально різні: Катя — режисерка за камерою, Діма — гість у кадрі
  if(pov==='katya') return [
    {who:'katya', emo:'normal', text:'Офіс агенції. Знімаємо ШТОРМНАДО.\nДва креативники, година на ідею.'},
    {who:'katya', emo:'tired',  text:'Той, з міліруванням. В камеру. Дубль три!'},
    {who:'dima',  emo:'happy',  text:'А куди дивитись — в камеру\nчи на режисерку?)'},
    {who:'katya', emo:'shy',    text:'(в камеру, Дімо.)'},
    {who:null,    emo:null,     text:'Шоу ніхто так і не побачив.'},
  ];
  return [
    {who:null,   emo:null,   text:'Офіс агенції. Мене покликали в шоу\nпро ідеї. Поряд — ще один креативник.'},
    {who:'guy',  emo:'normal',text:'Ну що, штормимо? Година пішла.'},
    {who:'dima', emo:'happy', text:'А куди дивитись — в камеру\nчи на режисерку?)'},
    {who:null,   emo:null,   text:'Режисерку я тоді до пуття й не роздивився.\n(Дарма.)'},
  ];
}
function chatScript(pov){
  const intro = pov==='katya' ? [
    {who:'katya', emo:'wow',   text:'Стоп. Це ж хлопець зі зйомок 2021-го…'},
  ] : [
    {who:'dima',  emo:'happy', text:'О, симпатична! Точно ніде не бачив)'},
  ];
  const common = [
    {who:'dima',  emo:'happy', text:'Йоу! Як трєня?)'},
    {who:'katya', emo:'tired', text:'Йоу) стресово 🥲\nБоюсь потрапити до важчих суперниць.'},
    {who:'dima',  emo:'happy', text: CENSORED
      ? 'Та навіть якщо потрапиш —\nвсеодно всіх покладеш'
      : 'Та навіть якщо потрапиш —\nвсеодно їх відпиздиш'},
    {who:'dima',  emo:'wow',   text:'А там такий двіж, як в карате-кіді?)'},
    {who:'dima',  emo:'happy', text:'Удачки тобі завтра!'},
    {who:'dima',  emo:'shy',   text:'ой'},
    {who:'dima',  emo:'shy',   text:'в сб)'},
  ];
  const outro = pov==='katya' ? [
    {who:null, emo:null, text:'11 серпня 2022. (Не пам’ятав.)'},
  ] : [
    {who:null, emo:null, text:'11 серпня 2022. (Бачив. Дубль три.)'},
  ];
  return [...intro, ...common, ...outro];
}
function dateScript(pov){
  const first = pov==='katya' ? [
    {who:'katya', emo:'normal',text:'Щоб ти розумів: у мене все несерйозно.'},
    {who:'dima',  emo:'happy', text:'Абсолютно. Максимально несерйозно.'},
  ] : [
    {who:'dima',  emo:'normal',text:'Щоб ти розуміла: у мене все несерйозно.'},
    {who:'katya', emo:'happy', text:'Ідеально. У мене тим більше.'},
  ];
  return [
    ...first,
    {who:null, emo:null, text:'І тут щось пішло не за планом…'},
  ];
}

/* ---- стрибки і колекційки у сценах-прогулянках ---- */
function initWalkScene(kind){
  // низько/високо поперемінно: високі — тільки в стрибку
  const xs = kind==='idea' ? [120,170,225,280,340] : [100,150,205,260,330];
  game.collect = {
    kind, got:0, toastT:0,
    items: xs.map((x,i)=>({x, y: FLOOR_Y - (i%2 ? 66 : 32), taken:false})),
  };
  game.player.dy = 0; game.player.vy = 0;
}
function walkJumpAndCollect(p){
  // стрибок: A / ПРОБІЛ / тап по сцені
  if(!game.dialog && input.actionEdge){
    input.actionEdge = false;
    if(p.dy === 0){ p.vy = -5.4; }
  }
  // автопілот у режимі перегляду теж підстрибує
  if(game.watch && !game.dialog && p.dy===0 && p.walking && game.t%96===0) p.vy = -5.4;
  if(p.dy < 0 || p.vy < 0){
    p.vy += 0.34;
    p.dy = Math.min(0, p.dy + p.vy);
    if(p.dy === 0 && p.vy > 0) p.vy = 0;
  }
  // збирання
  const c = game.collect; if(!c) return;
  const bodyY = FLOOR_Y + 2 + p.dy - 26;          // центр тулуба
  c.items.forEach(it=>{
    if(it.taken) return;
    if(Math.abs(p.x - it.x) < 11 && Math.abs(bodyY - it.y) < 17){
      it.taken = true; c.got++;
      if(c.got === c.items.length){
        c.toastT = 80;
        achUnlock(c.kind==='idea' ? 'storm' : 'hearts');
      }
    }
  });
  if(c.toastT > 0) c.toastT--;
}
function drawCollect(camX){
  const c = game.collect; if(!c) return;
  const t = game.t;
  c.items.forEach((it,i)=>{
    if(it.taken) return;
    const sx = Math.round(it.x - camX), sy = Math.round(it.y + Math.sin(t*0.06+i)*2);
    if(sx<-12||sx>W+12) return;
    if(c.kind==='idea'){
      ctx.fillStyle = 'rgba(255,232,140,.25)'; ctx.fillRect(sx-5,sy-6,12,14);   // сяйво
      ctx.fillStyle = '#f4d46a'; ctx.fillRect(sx-3,sy-4,8,7);                    // колба
      ctx.fillStyle = '#fff8d8'; ctx.fillRect(sx-1,sy-2,3,3);
      ctx.fillStyle = '#8a8878'; ctx.fillRect(sx-1,sy+3,4,3);                    // цоколь
    } else {
      ctx.fillStyle = COL.rose;
      ctx.fillRect(sx-4,sy-3,3,3); ctx.fillRect(sx+1,sy-3,3,3);
      ctx.fillRect(sx-4,sy-1,8,3); ctx.fillRect(sx-2,sy+2,4,2); ctx.fillRect(sx-1,sy+4,2,1);
    }
  });
  // лічильник
  ctx.fillStyle = 'rgba(0,0,0,.45)'; ctx.fillRect(W-64,4,60,13);
  ctx.fillStyle = '#fff'; ctx.font='bold 8px monospace'; ctx.textAlign='right';
  ctx.fillText((c.kind==='idea'?'💡 ':'♥ ') + c.got + '/' + c.items.length, W-8, 14);
  ctx.textAlign='left';
  // тост за повний збір
  if(c.toastT > 0){
    ctx.fillStyle = COL.gold; ctx.font='bold 9px monospace'; ctx.textAlign='center';
    ctx.fillText(c.kind==='idea' ? 'ШТОРМ ЗІБРАНО!' : 'ВСІ СЕРЦЯ ТВОЇ!', W/2, 30);
    ctx.textAlign='left';
  }
}

/* ================= персонаж (кежуал) ================= */
function drawPerson(x, y, who, phase, dir, walking, skin){
  const c = skin ? Object.assign({}, CHARS[who], skin) : CHARS[who];
  const px = (dx,dy,w,h,col)=>{ ctx.fillStyle=col; ctx.fillRect(Math.round(dx),Math.round(dy),w,h); };
  ctx.save();
  ctx.translate(Math.round(x), Math.round(y));
  if(dir<0) ctx.scale(-1,1);

  const bob = walking ? (phase&1) : 0;
  const legSpread = walking ? (phase&1 ? 2 : -1.2) : 0;

  // ноги (джинси)
  px(-6, -14+bob, 5, 14-bob, COL.jeansD);
  px(-6, -3, 6, 3, COL.ink);
  px(1+legSpread, -14+bob, 5, 14-bob, COL.jeans);
  px(1+legSpread, -3, 6, 3, COL.ink);
  // корпус (футболка/светр кольору персонажа)
  px(-8, -34+bob, 16, 21, c.top);
  px(-8, -34+bob, 4, 21, c.topD);
  px(0, -33+bob, 3, 3, COL.skin);              // виріз
  // руки
  const armSwing = walking ? (phase&1 ? 3 : -3) : 0;
  px(-11, -33+bob, 4, 12+armSwing, c.topD);
  px(-11, -21+bob+armSwing, 4, 4, COL.skin);
  px(7, -33+bob, 4, 12-armSwing, c.top);
  px(7, -21+bob-armSwing, 4, 4, COL.skin);
  // голова
  px(-6, -46+bob, 12, 12, COL.skin);
  px(-6, -37+bob, 12, 1, COL.skinSh);
  // волосся
  if(c.style==='bob'){
    // каре: верх + «штори» з обох боків до підборіддя
    const swing = walking ? (phase&1?1:0) : 0;
    px(-7, -49+bob, 14, 4, c.hair);
    px(-8, -47+bob+swing, 3, 12, c.hair);
    px(6, -47+bob+swing, 3, 12, c.hair);
    px(-6, -46+bob, 2, 3, c.hair);              // пасмо біля проділу
  } else if(c.style==='curly'){
    // кучері (Діма зразка лютого 2026)
    px(-7, -49+bob, 14, 5, c.hair);
    px(-8, -47+bob, 2, 3, c.hair); px(7, -47+bob, 2, 3, c.hair);
    px(-6, -51+bob, 3, 2, c.hair); px(-1, -52+bob, 3, 3, c.hair); px(4, -51+bob, 3, 2, c.hair);
    px(-7, -45+bob, 2, 4, c.hair); px(6, -45+bob, 2, 4, c.hair);
  } else {
    // чубчик-шторка на лоба
    px(-7, -48+bob, 14, 4, c.hair);
    px(-6, -45+bob, 11, 2, c.hair);             // гривка над очима
    px(-7, -45+bob, 2, 5, c.hair);              // скроня
    px(6, -45+bob, 1, 4, c.hair);
  }
  // мілірування (світлі пасма) — Діма зразка Штормнадо 2021
  if(c.hi){
    px(-5, -48+bob, 2, 4, c.hi); px(0, -49+bob, 2, 3, c.hi);
    px(3, -48+bob, 2, 4, c.hi); px(-7, -46+bob, 1, 3, c.hi);
  }
  // обличчя
  px(1, -42+bob, 2, 2, COL.ink);
  px(-3, -42+bob, 2, 2, COL.ink);
  px(0, -38+bob, 3, 1, COL.skinSh);
  ctx.restore();
}

/* ================= Кітана 🐈 =================
   Кішка з двору Дана, з осені 2023 в сім'ї.
   Розмита черепаха: сіро-блакитна з персиковими плямами,
   зелені очі, і час від часу показує язик (сімейне). */
function drawKitana(x, y, dir){
  const px = (dx,dy,w,h,col)=>{ ctx.fillStyle=col; ctx.fillRect(Math.round(dx),Math.round(dy),w,h); };
  ctx.save();
  ctx.translate(Math.round(x), Math.round(y));
  if(dir<0) ctx.scale(-1,1);
  const grey = '#7d7888', dark = '#615c6e', peach = '#c9967a';
  px(-7, -8, 12, 8, grey);                       // тіло (сидить)
  px(-7, -4, 12, 4, dark);
  px(-5, -8, 4, 3, peach);                       // персикові плями
  px(0, -5, 3, 3, peach);
  px(2, -14, 8, 8, grey);                        // голова
  px(2, -14, 3, 3, peach);                       // пляма на лобі (як на фото)
  px(2, -17, 3, 4, grey); px(7, -17, 3, 4, grey);// вушка
  px(3, -16, 1, 2, '#e8a0b0'); px(8, -16, 1, 2, '#e8a0b0');
  const flick = ((game.t>>4)&1) ? 2 : 0;         // хвіст махає
  px(-11, -10-flick, 4, 3, grey); px(-9, -8-flick, 3, 6, peach);
  px(4, -11, 2, 2, '#5a8c4e'); px(8, -11, 2, 2, '#5a8c4e');  // зелені очі
  px(6, -8, 2, 1, '#e8a0b0');                    // носик
  if(((game.t>>7)&3)===0) px(6, -7, 2, 2, '#e87a90');  // язичок 😛
  ctx.restore();
}

function drawPortraitInto(g, who, emo){
  const c = CHARS[who];
  const P = (x,y,w,h,col)=>{ g.fillStyle=col; g.fillRect(x,y,w,h); };
  P(0,0,32,32,'#cfd6dd');
  P(0,22,32,10,c.top);                             // плечі
  P(13,20,6,6,COL.skin);                           // шия
  P(7,4,18,18,COL.skin);                           // обличчя
  P(7,20,18,2,COL.skinSh);
  if(c.style==='bob'){
    // блондинисте каре з проділом
    P(5,2,22,5,c.hair);
    P(4,4,4,18,c.hair); P(24,4,4,18,c.hair);       // штори до підборіддя
    P(8,5,3,3,c.hair); P(21,5,3,3,c.hair);         // від проділу вбік
    P(15,2,2,2,'#b8905a');                         // проділ (тінь)
    P(18,15,1,1,'#c9c4b4');                        // сережка в носі
  } else {
    // шатен: гривка-шторка над бровами
    P(5,2,22,5,c.hair);
    P(6,6,20,3,c.hair);                            // гривка
    P(7,9,4,1,c.hair); P(21,9,4,1,c.hair);         // кінчики шторки
    P(5,4,3,10,c.hair); P(24,4,3,10,c.hair);       // скроні
  }
  const eye = COL.ink;
  if(emo==='happy'){
    P(11,11,3,1,eye); P(10,12,1,1,eye); P(13,12,1,1,eye);
    P(19,11,3,1,eye); P(18,12,1,1,eye); P(21,12,1,1,eye);
    P(13,17,6,2,COL.roseD);
    P(12,16,1,1,COL.roseD); P(19,16,1,1,COL.roseD);
  } else if(emo==='wow'){
    P(11,10,3,3,eye); P(19,10,3,3,eye);
    P(10,8,4,1,c.hair); P(18,8,4,1,c.hair);
    P(14,16,4,4,COL.roseD);
  } else if(emo==='tired'){
    P(11,12,3,1,eye); P(19,12,3,1,eye);
    P(11,10,3,1,c.hair); P(19,10,3,1,c.hair);
    P(13,18,6,1,COL.roseD);
    P(8,14,3,2,'#e79a9a'); P(21,14,3,2,'#e79a9a');
  } else if(emo==='shy'){
    P(11,11,2,2,eye); P(19,11,2,2,eye);
    P(13,18,5,1,COL.roseD);
    P(8,15,4,2,'#ef9aa5'); P(20,15,4,2,'#ef9aa5');
  } else {
    P(11,11,2,2,eye); P(19,11,2,2,eye);
    P(13,17,6,1,COL.roseD);
  }
}

/* ================= фон: знімальний майданчик ================= */
function drawSet(camX){
  // стіна студії
  ctx.fillStyle = COL.studioWall; ctx.fillRect(0,0,W,FLOOR_Y);
  // труси (рейки) під стелею
  ctx.fillStyle = COL.studioWallD;
  ctx.fillRect(0,10,W,4); ctx.fillRect(0,22,W,2);
  for(let tx=0; tx<LEVEL_W; tx+=60){
    const sx = Math.round(tx-camX); if(sx<-10||sx>W) continue;
    ctx.fillRect(sx,10,3,14);
  }
  // підлога
  ctx.fillStyle = COL.floor; ctx.fillRect(0,FLOOR_Y,W,H-FLOOR_Y);
  ctx.fillStyle = COL.floorD;
  for(let fx=0; fx<LEVEL_W; fx+=48){
    const sx = Math.round(fx-camX); if(sx<-4||sx>W) continue;
    ctx.fillRect(sx,FLOOR_Y,2,H-FLOOR_Y);
  }
  // кабелі на підлозі
  ctx.fillStyle = COL.ink;
  for(let cx=20; cx<LEVEL_W; cx+=90){
    const sx = Math.round(cx-camX); if(sx<-60||sx>W) continue;
    ctx.fillRect(sx,FLOOR_Y+8,40,2); ctx.fillRect(sx+30,FLOOR_Y+14,34,2);
  }

  // хромакей (зелений екран) — стоїть на підлозі
  const gx = Math.round(360-camX), gTop = FLOOR_Y-200;
  if(gx>-160 && gx<W){
    ctx.fillStyle = COL.metal; ctx.fillRect(gx-4,gTop,3,FLOOR_Y-gTop); ctx.fillRect(gx+151,gTop,3,FLOOR_Y-gTop);
    ctx.fillStyle = COL.ink; ctx.fillRect(gx-8,FLOOR_Y-2,12,4); ctx.fillRect(gx+147,FLOOR_Y-2,12,4);
    ctx.fillStyle = COL.greenD; ctx.fillRect(gx,gTop+4,150,FLOOR_Y-gTop-4);
    ctx.fillStyle = COL.green; ctx.fillRect(gx+4,gTop+8,142,FLOOR_Y-gTop-12);
    // назва шоу + піксельний вихор-«надо»
    ctx.fillStyle = '#fff'; ctx.font='bold 11px monospace'; ctx.textAlign='center';
    ctx.fillText('ШТОРМНАДО', gx+75, gTop+26);
    ctx.fillStyle = 'rgba(255,255,255,.85)';
    ctx.fillRect(gx+58,gTop+32,34,3); ctx.fillRect(gx+64,gTop+37,24,3);
    ctx.fillRect(gx+70,gTop+42,14,3); ctx.fillRect(gx+74,gTop+47,7,3);
  }
  // стенд із брифом і таймер шторму (година на ідеї)
  const bx2 = Math.round(150-camX);
  if(bx2>-40 && bx2<W){
    ctx.fillStyle = COL.metal; ctx.fillRect(bx2+10,88+GY,2,FLOOR_Y-88-GY);
    ctx.fillStyle = '#f8f8f3'; ctx.fillRect(bx2,60+GY,24,28);
    ctx.fillStyle = COL.ink; ctx.font='bold 6px monospace'; ctx.textAlign='center';
    ctx.fillText('БРИФ', bx2+12, 69+GY);
    ctx.fillStyle = '#999';
    ctx.fillRect(bx2+4,73+GY,16,2); ctx.fillRect(bx2+4,78+GY,16,2); ctx.fillRect(bx2+4,83+GY,10,2);
    ctx.fillStyle = COL.ink; ctx.fillRect(bx2+28,64+GY,30,14);
    ctx.fillStyle = '#e33'; ctx.font='bold 8px monospace';
    ctx.fillText('59:59', bx2+43, 74+GY);
  }
  // софтбокс
  const lx = Math.round(300-camX);
  if(lx>-40 && lx<W){
    ctx.fillStyle = COL.metal; ctx.fillRect(lx+8,70+GY,2,FLOOR_Y-70-GY);
    ctx.fillStyle = COL.ink; ctx.fillRect(lx,FLOOR_Y-2,18,3);
    ctx.fillStyle = COL.white; ctx.fillRect(lx,50+GY,20,22);
    ctx.fillStyle = 'rgba(255,250,220,.25)';
    ctx.beginPath(); ctx.moveTo(lx+20,52+GY); ctx.lineTo(lx+62,80+GY); ctx.lineTo(lx+62,120+GY); ctx.lineTo(lx+20,72+GY); ctx.fill();
  }
  // камера на штативі (ноги до підлоги)
  const kx = Math.round(210-camX);
  if(kx>-50 && kx<W){
    ctx.fillStyle = COL.ink;
    ctx.fillRect(kx,84+GY,26,16);                 // корпус
    ctx.fillRect(kx+26,88+GY,8,8);                // об'єктив
    ctx.fillStyle = '#c33'; ctx.fillRect(kx+3,87+GY,3,3);  // REC
    ctx.fillStyle = COL.metal;
    ctx.fillRect(kx+11,100+GY,4,FLOOR_Y-100-GY-2);
    ctx.fillRect(kx+3,100+GY,3,FLOOR_Y-100-GY); ctx.fillRect(kx+20,100+GY,3,FLOOR_Y-100-GY);
    ctx.fillStyle = COL.ink; ctx.fillRect(kx+1,FLOOR_Y-3,8,3); ctx.fillRect(kx+18,FLOOR_Y-3,8,3);
  }
  // режисерське крісло (ніжки до підлоги)
  const dx = Math.round(120-camX);
  if(dx>-40 && dx<W){
    ctx.fillStyle = COL.rose; ctx.fillRect(dx,96+GY,26,10);    // спинка
    ctx.fillStyle = '#fff'; ctx.font='bold 6px monospace'; ctx.textAlign='center';
    ctx.fillText('KAASIN', dx+13, 103+GY);
    ctx.fillStyle = COL.ink;
    ctx.fillRect(dx+2,106+GY,3,FLOOR_Y-106-GY); ctx.fillRect(dx+21,106+GY,3,FLOOR_Y-106-GY);
    ctx.fillRect(dx+2,114+GY,22,3);
  }
  // хлопавка біля хромакею
  const cx2 = Math.round(400-camX);
  if(cx2>-20 && cx2<W){
    ctx.fillStyle = COL.ink; ctx.fillRect(cx2,FLOOR_Y-8,14,8);
    ctx.fillStyle = COL.white; ctx.fillRect(cx2,FLOOR_Y-8,14,2);
  }
}

function drawPhone(){
  // тло — розмитий вечірній Київ (просто градієнт + вогники)
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#241d33'); g.addColorStop(1,'#3a2438');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  for(let i=0;i<24;i++){
    const sx = (i*53)%W, sy = (i*37)%H;
    ctx.fillStyle = 'rgba(255,230,160,.25)';

const BULLET_WORDS = ['СЕРЙОЗНІ СТОСУНКИ','ПЛАНИ НА МАЙБУТНЄ','ЗНАЙОМСТВО З МАМОЮ','СПІЛЬНИЙ ПОБУТ','ВІДПУСТКА РАЗОМ'];
const BOX = {x:60, y:(H-92)>>1, w:200, h:92};

function startBattle(){
  game.battle = {
    heart:{x:BOX.x+BOX.w/2, y:BOX.y+BOX.h/2},
    bullets:[], meter:100, invuln:0, over:false, spawnT:0, overT:0,
  };
  setPhase('battle');
}
function updateBattle(){
  const b = game.battle; if(!b) return;
  if(b.over){
    b.overT++;
    if(b.overT===110){
      startDialog(battleOutroScript(game.pov), ()=> setPhase('cap4'));
    }
    return;
  }
  // рух серця
  const h = b.heart, SP = 2.2;
  if(game.watch){
    h.y = BOX.y+BOX.h/2 + Math.sin(game.phaseT*0.05)*34;   // автопілот ухиляється так собі
    h.x = BOX.x+BOX.w/2 + Math.sin(game.phaseT*0.023)*50;
  } else {
    if(keys['ArrowLeft']||input.left) h.x -= SP;
    if(keys['ArrowRight']||input.right) h.x += SP;
    if(keys['ArrowUp']) h.y -= SP;
    if(keys['ArrowDown']) h.y += SP;
    if(dragTarget){ h.x += (dragTarget.x-h.x)*0.3; h.y += (dragTarget.y-h.y)*0.3; }
  }
  h.x = Math.max(BOX.x+5, Math.min(BOX.x+BOX.w-5, h.x));
  h.y = Math.max(BOX.y+5, Math.min(BOX.y+BOX.h-5, h.y));

  // кулі-слова
  b.spawnT++;
  if(b.spawnT > 46){
    b.spawnT = 0;
    const word = BULLET_WORDS[(Math.random()*BULLET_WORDS.length)|0];
    b.bullets.push({word, x:BOX.x+BOX.w+10, y:BOX.y+10+Math.random()*(BOX.h-20),
                    v:0.9+Math.random()*1.1, wob:Math.random()*6.28});
  }
  b.bullets.forEach(bl=>{ bl.x -= bl.v; bl.y += Math.sin(game.phaseT*0.06+bl.wob)*0.35; });
  b.bullets = b.bullets.filter(bl=> bl.x > BOX.x-120);

  // влучання
  if(b.invuln>0) b.invuln--;
  if(b.invuln===0){
    for(const bl of b.bullets){
      const bw = bl.word.length*4.9, bh = 8;
      if(h.x+4 > bl.x-2 && h.x-4 < bl.x+bw && h.y+4 > bl.y-bh && h.y-4 < bl.y+2){
        b.meter = Math.max(0, b.meter-15); b.invuln = 45; break;
      }
    }
  }
  // несерйозність тане сама собою — бій неможливо виграти
  b.meter = Math.max(0, b.meter - 0.075);
  if(b.meter===0 && !b.over){ b.over = true; b.overT = 0; b.bullets = []; }
}

/* ================= Лондон-тетріс ================= */
const TET = {COLS:9, ROWS:13, CELL:16, X:(320-9*16)>>1, Y:200, WIN_LINES:3};
const TETROMINOES = {
  I:{c:'#4a90d9', r:[[[0,1],[1,1],[2,1],[3,1]], [[2,0],[2,1],[2,2],[2,3]]]},
  O:{c:'#B58A2E', r:[[[1,0],[2,0],[1,1],[2,1]]]},
  T:{c:'#A8505F', r:[[[1,0],[0,1],[1,1],[2,1]], [[1,0],[1,1],[2,1],[1,2]], [[0,1],[1,1],[2,1],[1,2]], [[1,0],[0,1],[1,1],[1,2]]]},
  S:{c:'#3F7C77', r:[[[1,0],[2,0],[0,1],[1,1]], [[1,0],[1,1],[2,1],[2,2]]]},
  Z:{c:'#c96a4e', r:[[[0,0],[1,0],[1,1],[2,1]], [[2,0],[1,1],[2,1],[1,2]]]},
  J:{c:'#1E4E8A', r:[[[0,0],[0,1],[1,1],[2,1]], [[1,0],[2,0],[1,1],[1,2]], [[0,1],[1,1],[2,1],[2,2]], [[1,0],[1,1],[0,2],[1,2]]]},
  L:{c:'#8a6bb5', r:[[[2,0],[0,1],[1,1],[2,1]], [[1,0],[1,1],[1,2],[2,2]], [[0,1],[1,1],[2,1],[0,2]], [[0,0],[1,0],[1,1],[1,2]]]},
};
const TET_KEYS = Object.keys(TETROMINOES);

function startTetris(){
  game.tetris = {
    grid: Array.from({length:TET.ROWS}, ()=>Array(TET.COLS).fill(null)),
    piece:null, fallT:0, moveT:0, lines:0, started:false,
    win:false, winT:0, outroStarted:false, paused:false,
    flashRows:[], flashT:0, msgs:9000, ai:null,
  };
  setPhase('tetris');
  startDialog(tetrisIntroScript(game.pov), ()=>{ game.tetris.started = true; startMusic(); });
}
function toggleTetrisPause(){
  const t = game.tetris;
  if(!t || !t.started || t.win || game.watch) return;
  t.paused = !t.paused;
  if(t.paused) stopMusic(); else startMusic();
}
function tetCollides(t, key, rot, px, py){
  const cells = TETROMINOES[key].r[rot % TETROMINOES[key].r.length];
  return cells.some(([cx,cy])=>{
    const x = px+cx, y = py+cy;
    return x<0 || x>=TET.COLS || y>=TET.ROWS || (y>=0 && t.grid[y][x]);
  });
}
function tetSpawn(t){
  const key = TET_KEYS[(Math.random()*TET_KEYS.length)|0];
  t.piece = {key, rot:0, x:3, y:-1};
  if(tetCollides(t, key, 0, 3, -1)){
    // валіза переповнена — перепаковуємо (без фейлів, це ж історія кохання)
    t.grid = Array.from({length:TET.ROWS}, ()=>Array(TET.COLS).fill(null));
  }
  if(game.watch) tetPlanAI(t);
}
function tetPlanAI(t){
  // жадібний автопілот: мінімальна висота + без дірок, наскільки вміє
  let best = null;
  const rots = TETROMINOES[t.piece.key].r.length;
  for(let rot=0; rot<rots; rot++){
    for(let x=-2; x<TET.COLS; x++){
      if(tetCollides(t, t.piece.key, rot, x, 0) && tetCollides(t, t.piece.key, rot, x, -1)) continue;
      let y = t.piece.y;
      while(!tetCollides(t, t.piece.key, rot, x, y+1)) y++;
      if(tetCollides(t, t.piece.key, rot, x, y)) continue;
      const score = -y*2 + Math.abs(x-3)*0.1;   // нижче = краще
      if(best===null || score < best.score) best = {rot, x, score};
    }
  }
  t.ai = best ? {rot:best.rot, x:best.x} : {rot:0, x:3};
}
function tetLock(t){
  const cells = TETROMINOES[t.piece.key].r[t.piece.rot % TETROMINOES[t.piece.key].r.length];
  cells.forEach(([cx,cy])=>{
    const y = t.piece.y+cy, x = t.piece.x+cx;
    if(y>=0 && y<TET.ROWS && x>=0 && x<TET.COLS) t.grid[y][x] = TETROMINOES[t.piece.key].c;
  });
  t.piece = null;
  const full = [];
  for(let y=0;y<TET.ROWS;y++) if(t.grid[y].every(c=>c)) full.push(y);
  if(full.length){ t.flashRows = full; t.flashT = 18; }
}
function updateTetris(){
  const t = game.tetris; if(!t || !t.started || t.paused) return;

  if(t.win){
    t.winT++;
    if(t.winT===80 && !t.outroStarted){
      t.outroStarted = true;
      stopMusic();
      startDialog(tetrisOutroScript(game.pov), ()=> setPhase('capK'));
    }
    return;
  }
  // лічильник повідомлень тікає
  if(t.msgs < 11223) t.msgs = Math.min(11223, t.msgs + 2 + t.lines*2);

  // спалах зібраних рядків
  if(t.flashT > 0){
    t.flashT--;
    if(t.flashT===0){
      t.flashRows.sort((a,b)=>a-b).forEach(y=>{
        t.grid.splice(y,1);
        t.grid.unshift(Array(TET.COLS).fill(null));
      });
      t.lines += t.flashRows.length;
      t.flashRows = [];
      if(t.lines >= TET.WIN_LINES){ t.win = true; t.winT = 0; }
    }
    return;
  }
  if(t.lines >= TET.WIN_LINES || (game.watch && game.phaseT > 3200)){ t.win = true; t.winT = 0; return; }

  if(!t.piece){ tetSpawn(t); return; }
  const p = t.piece;

  if(game.watch && t.ai){
    if(game.phaseT % 5 === 0){
      if(p.rot !== t.ai.rot && !tetCollides(t,p.key,(p.rot+1),p.x,p.y)) p.rot = (p.rot+1) % TETROMINOES[p.key].r.length;
      else if(p.x < t.ai.x && !tetCollides(t,p.key,p.rot,p.x+1,p.y)) p.x++;
      else if(p.x > t.ai.x && !tetCollides(t,p.key,p.rot,p.x-1,p.y)) p.x--;
    }
  } else if(!game.watch){
    // рух з утриманням
    t.moveT++;
    const L = keys['ArrowLeft']||input.left, R = keys['ArrowRight']||input.right;
    if((L||R) && t.moveT>=7){
      t.moveT = 0;
      const dx = L ? -1 : 1;
      if(!tetCollides(t,p.key,p.rot,p.x+dx,p.y)) p.x += dx;
    }
    if(!L && !R) t.moveT = 7;
    // поворот (A / пробіл / тап / ArrowUp)
    if(input.actionEdge){
      const nr = (p.rot+1) % TETROMINOES[p.key].r.length;
      for(const kick of [0,-1,1,-2,2]){
        if(!tetCollides(t,p.key,nr,p.x+kick,p.y)){ p.rot = nr; p.x += kick; break; }
      }
      input.actionEdge = false;
    }
  }
  // падіння
  t.fallT++;
  const soft = keys['ArrowDown'] || input.down || (game.watch && t.ai && p.x===t.ai.x && p.rot===t.ai.rot);
  if(t.fallT >= (soft?2:24)){
    t.fallT = 0;
    if(!tetCollides(t,p.key,p.rot,p.x,p.y+1)) p.y++;
    else tetLock(t);
  }
}
function drawTetris(){

function startSvat(){
  game.svat = {
    step:'talk',            // talk | mash | slider | tied
    meter:0, particles:[],
    slider:{x:0, dir:1, stopped:false, verdict:null, msgT:0},
    tiedT:0,
  };
  setPhase('svat');
  startDialog(svatIntroScript(game.pov), ()=>{ game.svat.step='mash'; });
}
function updateSvat(){
  const s = game.svat; if(!s) return;

  if(s.step==='mash'){
    if(game.watch) s.meter += 1.1;
    else {
      s.meter = Math.max(0, s.meter - 0.15);
      if(input.actionEdge){
        s.meter += 7;
        input.actionEdge = false;
        for(let i=0;i<4;i++) s.particles.push({
          x: game.pov==='katya' ? 60 : 168, y: game.pov==='katya' ? 96 : 92,
          vx:(Math.random()-0.5)*2.4, vy:-Math.random()*2-0.5, life:26,
        });
      }
    }
    s.particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life--; });
    s.particles = s.particles.filter(p=>p.life>0);
    if(s.meter >= 100){ s.step='slider'; s.slider.x = 0; }
    return;
  }

  if(s.step==='slider'){
    const sl = s.slider;
    if(sl.msgT > 0){ sl.msgT--; if(sl.msgT===0){ sl.stopped=false; sl.verdict=null; } return; }
    if(!sl.stopped){
      sl.x += sl.dir*2.2;
      if(sl.x>=100){ sl.x=100; sl.dir=-1; }
      if(sl.x<=0){ sl.x=0; sl.dir=1; }
      const inRush = sl.x>38 && sl.x<62;
      const press = game.watch ? (inRush && game.phaseT>200) : input.actionEdge;
      if(press){
        input.actionEdge = false;
        sl.stopped = true;
        sl.verdict = inRush ? 'рушник' : 'гарбуз';
        if(sl.verdict==='гарбуз'){ sl.msgT = 80; achUnlock('harbuz'); }  // жарт і ще спроба
        else { s.step='tied'; s.tiedT=0; }
      }
    }
    return;
  }

  if(s.step==='tied'){
    s.tiedT++;
    if(s.tiedT===90){
      startDialog(svatOutroScript(game.pov), ()=> setPhase('cap6'));
    }
  }
}

const DIMA_FEB26 = {top:'#26242c', topD:'#141218', style:'curly'};   // чорна водолазка, кучері
const KATYA_FEB26 = {top:'#c4c0ce', topD:'#9a95aa'};                 // сіра флісова кофта

function startProposal(){
  game.prop = {
    step:'chess',           // chess | rummage | box | fingers | done
    sel:1, wrongT:0, solved:false,
    meter:0, particles:[],
    boxT:0, finger:-1, fingerSel:2, ringT:0,
  };
  setPhase('prop');
}
const CHESS_MOVES = [
  {label:'Сxb7?',  good:false, note:'слон нічого не вирішує'},
  {label:'Фd8#',   good:true,  note:'мат!'},
  {label:'e4??',   good:false, note:'це взагалі як'},
];
function updateProp(){
  const p = game.prop; if(!p) return;

  if(p.step==='chess'){
    if(p.solved || game.dialog) return;
    if(p.wrongT>0){ p.wrongT--; return; }
    if(game.watch){
      if(game.phaseT>160){ p.sel = game.pov==='katya' ? 1 : 0; confirmChess(); }
      return;
    }
    if(keys['ArrowLeft'] && !p._l){ p.sel = (p.sel+2)%3; } p._l = keys['ArrowLeft'];
    if(keys['ArrowRight'] && !p._r){ p.sel = (p.sel+1)%3; } p._r = keys['ArrowRight'];
    if(game._tapPos){
      p.sel = Math.max(0, Math.min(2, Math.floor((game._tapPos.x-40)/80)));
      game._tapPos = null; input.actionEdge = true;
    }
    if(input.actionEdge){ input.actionEdge = false; confirmChess(); }
    return;
  }

  if(p.step==='rummage'){
    if(game.watch) p.meter += 1.2;
    else {
      p.meter = Math.max(0, p.meter - 0.12);
      if(input.actionEdge){
        p.meter += 7; input.actionEdge = false;
        for(let i=0;i<3;i++) p.particles.push({
          x:196, y:126, vx:(Math.random()-0.5)*3, vy:-Math.random()*2.4, life:24,
        });
      }
    }
    p.particles.forEach(q=>{ q.x+=q.vx; q.y+=q.vy; q.vy+=0.12; q.life--; });
    p.particles = p.particles.filter(q=>q.life>0);
    if(p.meter>=100){ p.step='box'; p.boxT=0; }
    return;
  }

  if(p.step==='box'){
    p.boxT++;
    if(p.boxT===120){
      startDialog(propBoxScript(game.pov), ()=>{ p.step='fingers'; });
    }
    return;
  }

  if(p.step==='fingers'){
    if(p.finger>=0){
      p.ringT++;
      if(p.ringT===100){
        p.step='done';
        startDialog(propOutroScript(game.pov), ()=> setPhase('cap7'));
      }
      return;
    }
    if(game.watch){
      if(game.phaseT % 40 === 0) p.fingerSel = (p.fingerSel+1)%5;
      if(game.phaseT > 260){ p.finger = 3; p.ringT = 0; }   // підмізинний, як годиться
      return;
    }
    if(keys['ArrowLeft'] && !p._l){ p.fingerSel = (p.fingerSel+4)%5; } p._l = keys['ArrowLeft'];
    if(keys['ArrowRight'] && !p._r){ p.fingerSel = (p.fingerSel+1)%5; } p._r = keys['ArrowRight'];
    if(game._tapPos){
      p.fingerSel = Math.max(0, Math.min(4, Math.floor((game._tapPos.x-95)/28)));
      game._tapPos = null; input.actionEdge = true;
    }
    if(input.actionEdge){
      input.actionEdge = false;
      p.finger = p.fingerSel; p.ringT = 0;
      if(p.finger === 3) achUnlock('ring');
    }
  }
}
function confirmChess(){
  const p = game.prop;
  const move = CHESS_MOVES[p.sel];
  if(game.pov==='katya' && !move.good){ p.wrongT = 70; p._missed = true; return; }
  p.solved = true;
  if(game.pov==='katya' && !p._missed) achUnlock('mate1');
  startDialog(propChessOutroScript(game.pov), ()=>{ game.prop.step='rummage'; game.prop.meter=0; });
}

function startDiia(){
  game.diia = {step:'surname', choice:-1, hold:0, sent:false, sentT:0, confetti:[], optRects:[]};
  setPhase('diia');

function updateDiia(){
  const d = game.diia; if(!d) return;

  if(d.step==='surname'){
    if(game.watch && game.phaseT > 70 && d.choice<0){ d.choice = 0; }
    if(game.watch && d.choice>=0 && game.phaseT > 110){ d.step='submit'; game.diiaSurname = SURNAMES[d.choice].label; }
    return;
  }

  if(d.step==='submit'){
    const holding = game.watch || input.action || game._holdPtr || keys[' '] || keys['Enter'];
    d.hold = holding ? Math.min(100, d.hold+1.1) : Math.max(0, d.hold-2.5);
    if(d.hold>=100){ d.step='sent'; d.sentT=0; }
    return;
  }

  // sent
  d.sentT++;
  if(d.sentT===40){
    for(let i=0;i<40;i++) d.confetti.push({
      x:Math.random()*W, y:-10-Math.random()*60,
      v:0.6+Math.random()*1.2, c:['#A8505F','#B58A2E','#3F7C77','#1E4E8A','#f4f0e4'][i%5],
    });
  }
  d.confetti.forEach(q=>{ q.y+=q.v; });
  if(d.sentT===170) setPhase('cap8');
}
function diiaTap(pos){
  const d = game.diia; if(!d || d.step!=='surname') return false;
  for(let i=0;i<d.optRects.length;i++){
    const r = d.optRects[i];
    if(pos.x>r.x && pos.x<r.x+r.w && pos.y>r.y && pos.y<r.y+r.h){
      d.choice = i; d.step='submit'; d.hold=0;
      game.diiaSurname = SURNAMES[i].label;
      return true;
    }
  }
  return false;
}

/* ---- музика: «Минає день, минає ніч» (Мозговий/Рибчинський), приспів ----
   Реконструкція мелодії по пам'яті — Катя виправить у семплері. */
let audioCtx = null, musicTimer = null, musicOn = false;
function ensureAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function playNote(f, t, d, type, vol){
  const o = audioCtx.createOscillator(), gn = audioCtx.createGain();
  o.type = type; o.frequency.value = f;
  gn.gain.setValueAtTime(vol, t);
  gn.gain.exponentialRampToValueAtTime(0.001, t+d*0.92);
  o.connect(gn); gn.connect(audioCtx.destination);
  o.start(t); o.stop(t+d);
}
const A4=440, B4=493.88, C5=523.25, D5=587.33, E5=659.25, Gs4=415.30;
const MELODY = [ // «Біда не в тім, що ти мене не любиш…»
  [E5,.38],[E5,.38],[D5,.38],[C5,.76],
  [D5,.38],[C5,.38],[B4,.38],[A4,.76],
  [E5,.38],[E5,.38],[D5,.38],[C5,.38],[D5,.38],[C5,.38],
  [B4,.38],[A4,.38],[Gs4,.76],[A4,1.14],
];
const BASSLINE = [110, 146.83, 164.81, 110];       // Am Dm E Am
function startMusic(){
  try{
    ensureAudio();
    if(musicOn) return;
    musicOn = true;
    const loopDur = MELODY.reduce((a,[,d])=>a+d,0);
    let nextT = audioCtx.currentTime + 0.05;
    const schedule = ()=>{
      if(!musicOn) return;
      while(nextT < audioCtx.currentTime + 0.8){
        let tt = nextT;
        MELODY.forEach(([f,d])=> { playNote(f, tt, d, 'square', 0.04); tt += d; });
        const barLen = loopDur/4;
        BASSLINE.forEach((bf,i)=>{
          playNote(bf, nextT+i*barLen, barLen*0.95, 'triangle', 0.055);
          playNote(bf*2, nextT+i*barLen+barLen/2, barLen*0.4, 'triangle', 0.03);
        });
        nextT += loopDur;
      }
    };
    schedule();
    musicTimer = setInterval(schedule, 400);
  }catch(e){ /* без звуку — теж гра */ }
}
function stopMusic(){

function showLine(){
  const d = game.dialog, ln = d.lines[d.idx];
  d.shown = 0; d.waitTimer = 0;

    const c = CHARS[ln.who];

function advanceDialog(){
  const d = game.dialog; if(!d) return;
  const ln = d.lines[d.idx];
  if(d.shown < ln.text.length){ d.shown = ln.text.length; elText.textContent = ln.text; elArrow.classList.remove('hidden'); return; }
  d.idx++;
  if(d.idx >= d.lines.length){
    game.dialog = null;
    elDialog.classList.add('hidden');
    const cb = game.onDialogEnd; game.onDialogEnd = null;
    if(cb) cb();
  } else showLine();
}
function updateDialog(){
  const d = game.dialog; if(!d) return;
  const ln = d.lines[d.idx];
  if(d.shown < ln.text.length){
    d.shown = Math.min(ln.text.length, d.shown + 2);
    elText.textContent = ln.text.slice(0, d.shown);
    if(d.shown === ln.text.length) elArrow.classList.remove('hidden');
  } else if(game.watch){
    d.waitTimer++;
    if(d.waitTimer > 45) advanceDialog();
  }
}

const keys = {};
addEventListener('keydown', e=>{
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
  if(e.repeat) return;
  keys[e.key] = true;
  if(e.key===' '||e.key==='Enter'||e.key==='z'||e.key==='Z') input.actionEdge = true;
  if(e.key==='ArrowUp' && game.phase==='tetris') input.actionEdge = true;   // поворот фігури
  if((e.key==='p'||e.key==='P'||e.key==='Escape') && game.phase==='tetris'){ toggleTetrisPause(); return; }
  // перехоплення керування — лише навмисними ігровими клавішами
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' ','Enter','z','Z'].includes(e.key)) takeOver();
});
addEventListener('keyup', e=>{ keys[e.key] = false; });

function bindPad(id, prop){
  const el = document.getElementById(id);
  const on = e=>{ e.preventDefault(); input[prop]=true; if(prop==='action') input.actionEdge=true; takeOver(); };
  const off = e=>{ e.preventDefault(); input[prop]=false; };
  el.addEventListener('pointerdown', on);
  el.addEventListener('pointerup', off);
  el.addEventListener('pointerleave', off);
  el.addEventListener('pointercancel', off);
}
bindPad('pad-left','left'); bindPad('pad-right','right'); bindPad('pad-down','down'); bindPad('pad-a','action');

let dragTarget = null;
function canvasPos(e){
  const r = cv.getBoundingClientRect();
  return {x:(e.clientX-r.left)/r.width*W, y:(e.clientY-r.top)/r.height*H};
}
cv.addEventListener('pointerdown', e=>{
  e.preventDefault();
  if(game.state==='title'){ tryEgg(canvasPos(e)); return; }
  if(game.watch){ if(game.state==='play') tryEgg(canvasPos(e)); return; }  // у перегляді — лише пасхалки
  if(game.phase==='battle' && game.battle && !game.battle.over){ dragTarget = canvasPos(e); }
  else if(game.phase==='tinder'){ game._swipeDrag = canvasPos(e).x; game._swipeReleased = false; }
  else if(game.phase==='prop' && game.prop && (game.prop.step==='chess'||game.prop.step==='fingers') && !game.dialog){
    game._tapPos = canvasPos(e);
  }
  else if(game.phase==='diia'){
    const pos = canvasPos(e);
    if(diiaTap(pos)){ /* обрано прізвище */ }
    else if(!tryEgg(pos)) game._holdPtr = true;
  }
  else if(game.phase==='svat' && game.svat){
    const pos = canvasPos(e);
    if(Math.abs(pos.x-112) < 18 && pos.y > FLOOR_Y-50){  // тап по Кітані біля печі
      game.svat.purrT = 70;
      achUnlock('purr');
    } else input.actionEdge = true;
  }
  else if(tryEgg(canvasPos(e))){ /* пасхалка спіймана */ }
  else input.actionEdge = true;
});
cv.addEventListener('pointermove', e=>{
  if(dragTarget) dragTarget = canvasPos(e);
  if(game._swipeDrag != null && game.phase==='tinder'){
    game.swipeX = canvasPos(e).x - game._swipeDrag;      // картка їде за пальцем
  }
});
addEventListener('pointerup', ()=>{
  dragTarget = null; game._holdPtr = false;
  if(game._swipeDrag != null){
    game._swipeDrag = null;
    if(game.swipeX > 55) setPhase('swipe');              // дотягнув вправо — метч
    // інакше картка сама повернеться (updateTinder)
  }
});

/* ================= головний цикл ================= */
function update(){
  game.t++; game.phaseT++;
  if(game.state!=='play') return;

  const p = game.player, npc = game.npc;

  switch(game.phase){

    case 'cap1':
      if(game.phaseT > 70 || input.actionEdge) setPhase('set');
      break;

    case 'set': {
      let mv = 0;
      if(!game.dialog){
        if(game.watch){
          if(p.x < npc.x - 34) mv = 1;
        } else {
          if(keys['ArrowLeft']||input.left) mv = -1;
          if(keys['ArrowRight']||input.right) mv = 1;
        }
      }
      p.walking = mv!==0;
      if(mv!==0){
        p.dir = mv;
        p.x = Math.max(14, Math.min(LEVEL_W-14, p.x + mv*1.6));
        if(game.t%8===0) p.phase++;
      }
      npc.dir = p.x > npc.x ? 1 : -1;

      walkJumpAndCollect(p);
      if(!game.dialog && Math.abs(p.x-npc.x) < 36 && !game._setDone){
        game._setDone = true;
        startDialog(setScript(game.pov), ()=> { achUnlock('dubl3'); setPhase('cap2'); });
      }
      const target = Math.max(0, Math.min(LEVEL_W-W, p.x - 130));
      game.camX += (target - game.camX)*0.12;
      break;
    }

    case 'cap2':
      if(game.phaseT > 70 || input.actionEdge) setPhase('tinder');
      break;

    case 'tinder':
      if(game.watch){
        if(game.phaseT > 90) setPhase('swipe');
      } else if(game._swipeDrag != null){
        // тягнемо картку пальцем — обробляється в pointermove/up
      } else if(input.actionEdge){
        setPhase('swipe');                 // фолбек: пробіл = автосвайп
      } else if(game.swipeX !== 0){
        game.swipeX *= 0.75;               // відпустив, не долетів — картка вертається
        if(Math.abs(game.swipeX) < 1) game.swipeX = 0;
      }
      break;

    case 'swipe':
      game.swipeX += 7;
      if(game.swipeX > 130) setPhase('match');
      break;

    case 'match':
      if(game.phaseT === 95 || (!game.watch && input.actionEdge && game.phaseT>25)){
        setPhase('chat');
        startDialog(chatScript(game.pov), ()=>{
          // перехід до сцени першого побачення
          game.player = {x:36, dir:1, walking:false, phase:0, dy:0, vy:0};
          game.npc = {x:410, dir:-1, phase:0};
          game.camX = 0; game._dateDone = false;
          initWalkScene('heart');
          setPhase('cap3');
        });
      }
      break;

    case 'cap3':
      if(game.phaseT > 70 || input.actionEdge) setPhase('date');
      break;

    case 'date': {
      let mv = 0;
      if(!game.dialog){
        if(game.watch){
          if(p.x < npc.x - 34) mv = 1;
        } else {
          if(keys['ArrowLeft']||input.left) mv = -1;
          if(keys['ArrowRight']||input.right) mv = 1;
        }
      }
      p.walking = mv!==0;
      if(mv!==0){
        p.dir = mv;
        p.x = Math.max(14, Math.min(LEVEL_W-14, p.x + mv*1.6));
        if(game.t%8===0) p.phase++;
      }
      npc.dir = p.x > npc.x ? 1 : -1;
      walkJumpAndCollect(p);
      if(!game.dialog && Math.abs(p.x-npc.x) < 36 && !game._dateDone){
        game._dateDone = true;
        startDialog(dateScript(game.pov), ()=> startBattle());
      }
      const target2 = Math.max(0, Math.min(LEVEL_W-W, p.x - 130));
      game.camX += (target2 - game.camX)*0.12;
      break;
    }

    case 'battle':
      updateBattle();
      break;

    case 'cap4':
      if(game.phaseT > 70 || input.actionEdge) startTetris();
      break;

    case 'tetris':
      updateTetris();
      break;

    case 'capK':
      if(game.phaseT > 70 || input.actionEdge) startKitana();
      break;

    case 'kitana':
      if(input.actionEdge && !game.dialog) kitanaFlap();   // тап/пробіл — стрибок (діалог гортає глобальний обробник)
      updateKitana();
      break;

    case 'cap5':
      if(game.phaseT > 70 || input.actionEdge) startSvat();
      break;

    case 'svat':
      updateSvat();
      break;

    case 'cap6':
      if(game.phaseT > 70 || input.actionEdge) startProposal();
      break;

    case 'prop':
      updateProp();
      break;

    case 'cap7':
      if(game.phaseT > 70 || input.actionEdge) startDiia();
      break;

    case 'diia':
      updateDiia();
      break;

    case 'cap8':
      if(game.phaseT > 70 || input.actionEdge) setPhase('wed');
      break;

    case 'wed':
      if(game.phaseT === 230) finishGame();
      break;
  }

  if(input.actionEdge && game.dialog) advanceDialog();
  input.actionEdge = false;
  updateDialog();
}

const SMP = {
  rows: [
    {n:'A5', f:880.00}, {n:'G5', f:783.99}, {n:'E5', f:659.25}, {n:'D5', f:587.33},
    {n:'C5', f:523.25}, {n:'B4', f:493.88}, {n:'A4', f:440.00}, {n:'G4', f:392.00},
  ],

  grid: [],            // grid[row][step] = bool
  playing: false, timer: null, col: 0,
};
(function buildSampler(){
  SMP.grid = SMP.rows.map(()=>Array(SMP.steps).fill(false));
  const el = document.getElementById('s-grid');
  SMP.rows.forEach((row, r)=>{
    const lab = document.createElement('div');

    el.appendChild(lab);
    for(let c=0; c<SMP.steps; c++){
      const cell = document.createElement('div');
      cell.className = 's-cell';
      cell.dataset.r = r; cell.dataset.c = c;
      cell.addEventListener('pointerdown', e=>{
        e.preventDefault();
        SMP.grid[r][c] = !SMP.grid[r][c];
        cell.classList.toggle('on', SMP.grid[r][c]);

/* ================= пасхалки ================= */
/* код Konami — глобально */
const KONAMI = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
let konamiPos = 0, heartRain = false;
addEventListener('keydown', e=>{
  const k = e.key.length===1 ? e.key.toLowerCase() : e.key;
  konamiPos = (k === KONAMI[konamiPos]) ? konamiPos+1 : (k===KONAMI[0] ? 1 : 0);
  if(konamiPos === KONAMI.length){
    konamiPos = 0; heartRain = true;
    const was = game.watch; game.watch = false; achUnlock('konami'); game.watch = was;
    for(let i=0;i<30;i++) eggParticles.push({x:Math.random()*W, y:-Math.random()*40, vy:1+Math.random()*1.5, kind:'heart'});
  }
});
/* клікабельні приховані пасхалки в сценах */
const eggParticles = [];
const SCENE_EGGS = {
  // сцена: [{x,y,r,burst}]  (координати у світі 320x180, camX враховується для скрол-сцен)
  title: [{x:160, y:98, r:16, kind:'heart', world:false}],   // серце між ними
  set:   [{x:120, y:100, r:16, kind:'meow', world:true}],    // крісло KAASIN
  diia:  [{x:160, y:20,  r:14, kind:'heart', world:false}],  // лого дія
  wed:   [{x:70,  y:52,  r:18, kind:'confetti', world:false}], // сонце
};
function tryEgg(pos){
  const key = game.state==='title' ? 'title' : game.phase;
  const eggs = SCENE_EGGS[key];
  if(!eggs) return false;
  for(const e of eggs){
    const ex = e.world ? e.x - game.camX : e.x;
    if(Math.abs(pos.x-ex) < e.r && Math.abs(pos.y-e.y) < e.r){
      achUnlock('egg');
      const cols = {heart:'heart', meow:'meow', confetti:'confetti'};
      for(let i=0;i<14;i++) eggParticles.push({
        x:ex, y:e.y, vx:(Math.random()-0.5)*3, vy:-Math.random()*3-0.5, kind:e.kind,
      });
      return true;
    }
  }
  return false;
}
function drawEggParticles(){
  if(heartRain && game.t%6===0) eggParticles.push({x:Math.random()*W, y:-6, vy:1+Math.random()*1.5, kind:'heart'});
  for(let i=eggParticles.length-1;i>=0;i--){
    const p = eggParticles[i];
    p.x += p.vx||0; p.y += (p.vy = (p.vy||0)+0.12);
    if(p.kind==='heart'){
      ctx.fillStyle = COL.rose;
      ctx.fillRect(p.x-2,p.y-1,2,2); ctx.fillRect(p.x+1,p.y-1,2,2); ctx.fillRect(p.x-2,p.y,5,2);
    } else if(p.kind==='confetti'){
      ctx.fillStyle = ['#A8505F','#B58A2E','#3F7C77'][i%3]; ctx.fillRect(p.x,p.y,2,2);
    } else { // meow
      ctx.fillStyle = '#fff'; ctx.font='7px monospace'; ctx.fillText('ня', p.x, p.y);
    }
    if(p.y > H+8) eggParticles.splice(i,1);
  }
  if(eggParticles.length > 200) eggParticles.splice(0, eggParticles.length-200);
}

/* ================= Кітана: осінь 2023, двір Дана (керування нявканням) ================= */
/* мікрофон */
let micAnalyser = null, micData = null, micReq = false;
function setupMic(){
  if(micReq) return; micReq = true;
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    ensureAudio();
    const src = audioCtx.createMediaStreamSource(stream);
    micAnalyser = audioCtx.createAnalyser();
    micAnalyser.fftSize = 256;
    micData = new Uint8Array(micAnalyser.frequencyBinCount);
    src.connect(micAnalyser);
  }).catch(()=>{ micAnalyser = null; });
}
function micLevel(){
  if(!micAnalyser) return 0;
  micAnalyser.getByteTimeDomainData(micData);
  let sum = 0;
  for(let i=0;i<micData.length;i++){ const v=(micData[i]-128)/128; sum += v*v; }
  return Math.sqrt(sum/micData.length);   // 0..~1
}

function startKitana(){
  game.kitana = {y:100, vy:0, fences:[], dist:0, goal:1000, t:0,
    reached:false, reachedT:0, bumpT:0, meowCd:0, gotMeow:false};
  setupMic();
  setPhase('kitana');
  startDialog(kitanaIntroScript(game.pov), ()=>{ game.kitana.started = true; });
}
function kitanaIntroScript(pov){
  return [
    {who:null, emo:null, text:'Осінь 2023. Двір друга Дана.\nМале сіре кошеня.'},
    {who:null, emo:null, text:'🎤 Нявкай у мікрофон, щоб кликати Кітану!\n(або тапай / ПРОБІЛ)'},
  ];
}
function kitanaFlap(){
  const k = game.kitana; if(!k || !k.started || k.reached) return;
  k.vy = -3.0;
  if(game.t%4===0) eggParticles.push({x:58, y:k.y-8, vy:-0.5, kind:'meow'});
}
function updateKitana(){
  const k = game.kitana; if(!k || !k.started) return;
  if(k.reached){ k.reachedT++;
    if(k.reachedT===70) startDialog(kitanaOutroScript(game.pov), ()=> setPhase('cap5'));
    return;
  }
  k.t++;
  // нявкання → злетіти
  if(k.meowCd>0) k.meowCd--;
  const lvl = micLevel();
  if(lvl > 0.12 && k.meowCd===0){ kitanaFlap(); k.meowCd = 10; k.gotMeow = true; if(k.gotMeow) achUnlock('flappy'); }
  if(game.watch && k.t%46===0) kitanaFlap();

  k.vy += 0.26; k.y += k.vy;
  k.dist += 1.8;
  // паркан-перешкоди з проходом
  if(k.t % 100 === 0 && k.dist < k.goal-120){
    const gap = 58, top = 22 + Math.random()*(H-22-gap-38);
    k.fences.push({x:W+10, top, gap});
  }
  k.fences.forEach(f=>{ f.x -= 1.8; });
  k.fences = k.fences.filter(f=> f.x > -20);
  // м'яке зіткнення — не програш, просто «підстрибнула» назад
  const cx=58, cr=7;
  for(const f of k.fences){
    if(f.x < cx+cr && f.x+16 > cx-cr && (k.y-cr < f.top || k.y+cr > f.top+f.gap)){
      k.vy = -1.5; k.dist = Math.max(0, k.dist-40); k.bumpT = 12; f.x -= 30; break;
    }
  }
  if(k.bumpT>0) k.bumpT--;
  if(k.y > H-6){ k.y = H-6; k.vy = -1.2; }
  if(k.y < 4){ k.y = 4; k.vy = 0.5; }
  if(k.dist >= k.goal){ k.reached = true; k.reachedT = 0; }
}
function drawKitanaScene(){
  const k = game.kitana; if(!k) return;
  // двір: небо + паркан-тло + земля
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#c9b78a'); g.addColorStop(1,'#e8dcc0'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#a8935e'; ctx.fillRect(0,H-14,W,14);           // земля
  // осіннє листя
  for(let i=0;i<10;i++){
    const lx=(i*61 + game.t)%(W+20)-10, ly=40+(i*29+game.t*0.6)%(H-50);
    ctx.fillStyle = ['#b5652e','#c98a3e','#8a6b2e'][i%3]; ctx.fillRect(lx,ly,3,3);
  }
  // паркани-перешкоди (вертикальні дошки)
  k.fences.forEach(f=>{
    for(const seg of [[0,f.top],[f.top+f.gap,H-14-(f.top+f.gap)]]){
      ctx.fillStyle = '#6e4a2e'; ctx.fillRect(f.x, seg[0], 16, seg[1]);
      ctx.fillStyle = '#5a3a22';
      ctx.fillRect(f.x+3, seg[0], 2, seg[1]); ctx.fillRect(f.x+9, seg[0], 2, seg[1]);
    }
  });
  // Катя і Діма чекають наприкінці — виїжджають з-за правого краю під фініш
  const endX = 150 + (1 - Math.min(1,k.dist/k.goal))*220;
  if(endX < W+16){
    drawPerson(endX, H-14, 'katya', 0, 1, false);
    drawPerson(endX+20, H-14, 'dima', 0, -1, false);
    ctx.fillStyle = COL.rose; ctx.font='7px monospace'; ctx.textAlign='center';
    ctx.fillText('кс-кс-кс', endX+10, H-52+((game.t>>3)&1));
  }
  // Кітана
  const rot = Math.max(-0.5, Math.min(0.8, k.vy*0.08));
  ctx.save(); ctx.translate(58, k.y); ctx.rotate(rot);
  ctx.fillStyle = k.bumpT>0?'#9a5a5a':'#7d7888'; ctx.fillRect(-7,-6,14,12);
  ctx.fillStyle = '#c9967a'; ctx.fillRect(-5,-4,4,4);
  ctx.fillStyle = '#7d7888'; ctx.fillRect(-9,-8,4,4); ctx.fillRect(3,-8,4,4);
  ctx.fillStyle = '#5a8c4e'; ctx.fillRect(-4,-3,2,2); ctx.fillRect(2,-3,2,2);
  const wing=(game.t>>2)&1; ctx.fillStyle = '#615c6e'; ctx.fillRect(-2, wing?2:-8, 6, 4);
  ctx.restore();
  // прогрес-смуга «додому»
  ctx.fillStyle = 'rgba(0,0,0,.4)'; ctx.fillRect(40,8,240,8);
  ctx.fillStyle = COL.rose; ctx.fillRect(40,8,240*Math.min(1,k.dist/k.goal),8);
  ctx.fillStyle = '#fff'; ctx.font='7px monospace'; ctx.textAlign='center';
  ctx.fillText('🏠 додому', W/2, 14);
  // індикатор гучності + підказка
  if(!k.reached){
    const lvl = micLevel();
    if(micAnalyser){
      ctx.fillStyle = 'rgba(0,0,0,.4)'; ctx.fillRect(W-44,20,40,8);
      ctx.fillStyle = lvl>0.12?'#3fae54':'#B58A2E'; ctx.fillRect(W-44,20,40*Math.min(1,lvl*4),8);
      ctx.fillStyle='#fff'; ctx.font='6px monospace'; ctx.textAlign='right'; ctx.fillText('🎤', W-46, 27);
    }
    ctx.fillStyle = 'rgba(26,26,36,.5)'; ctx.font='8px monospace'; ctx.textAlign='center';
    ctx.fillText(micAnalyser ? '🐈 нявкай, щоб Кітана летіла!' :
      (isTouch?'тап — стрибок':'ПРОБІЛ — стрибок'), W/2, H-4);
  } else {
    ctx.fillStyle = COL.rose; ctx.font='bold 12px monospace'; ctx.textAlign='center';
    ctx.fillText('КІТАНА ВДОМА ♥', W/2, 40);
  }
  ctx.textAlign='left';
}
function kitanaOutroScript(pov){
  return [
    {who:null, emo:null, text:'Кітана обрала вас.\nЗ того дня — вона вдома. 🐈'},
  ];
}

['gesturestart','gesturechange','gestureend'].forEach(ev=>

/* ================= RSVP: питання гостям ================= */
const RSVP_QUESTIONS = [
  {q:'Ти з нами 6 вересня?', opts:['Звісно! 🥂','Дуже постараюсь','Ніяк 😢']},
  {q:'Скільки вас буде?', opts:['Я','Я +1','Ми сім’єю']},
  {q:'Що тобі наливати?', opts:['Вино','Щось міцніше','Безалко']},
  {q:'Пісня, під яку ти точно танцюєш?', input:true},
];
const rsvp = {idx:0, answers:[]};
const elRsvp = document.getElementById('rsvp-screen');
const elRsvpQ = document.getElementById('rsvp-q');
const elRsvpOpts = document.getElementById('rsvp-opts');
const elRsvpInput = document.getElementById('rsvp-input');
const elRsvpDots = document.getElementById('rsvp-dots');
const elRsvpSummary = document.getElementById('rsvp-summary');

function rsvpShow(){
  const item = RSVP_QUESTIONS[rsvp.idx];
  elRsvpSummary.classList.add('hidden');
  elRsvpDots.textContent = RSVP_QUESTIONS.map((_,i)=> i===rsvp.idx?'●':(i<rsvp.idx?'✓':'○')).join(' ');
  if(!item){ rsvpFinish(); return; }
  elRsvpQ.textContent = item.q;
  elRsvpOpts.innerHTML = '';
  if(item.input){
    elRsvpInput.classList.remove('hidden');
    elRsvpInput.value = '';
    const b = document.createElement('button');
    b.className = 'btn katya'; b.textContent = 'Далі';
    b.addEventListener('click', ()=>{
      rsvp.answers.push(elRsvpInput.value.trim() || '—');
      elRsvpInput.classList.add('hidden');
      rsvp.idx++; rsvpShow();
    });
    elRsvpOpts.appendChild(b);
  } else {
    elRsvpInput.classList.add('hidden');
    item.opts.forEach(opt=>{
      const b = document.createElement('button');
      b.className = 'btn';
      b.style.background = '#2b2b38';
      b.textContent = opt;
      b.addEventListener('click', ()=>{
        rsvp.answers.push(opt);
        rsvp.idx++; rsvpShow();
      });
      elRsvpOpts.appendChild(b);
    });
  }
}
function rsvpText(){
  const code = PARAMS.get('guest') || 'без коду';
  return 'Відповіді на весільне запрошення (' + code + '):\n' +
    RSVP_QUESTIONS.map((it,i)=> (i+1)+') '+it.q+' — '+rsvp.answers[i]).join('\n');
}
function rsvpFinish(){
  elRsvpQ.textContent = 'Дякуємо! Надішли нам відповіді:';
  elRsvpDots.textContent = '';
  elRsvpSummary.textContent = rsvpText();
  elRsvpSummary.classList.remove('hidden');
  elRsvpOpts.innerHTML = '';
  const mk = (label, bg, fn)=>{
    const b = document.createElement('button');
    b.className='btn'; b.style.background=bg; b.textContent=label;
    b.addEventListener('click', fn);
    elRsvpOpts.appendChild(b);
  };
  mk('✈️ Надіслати в Telegram', 'var(--terra)', ()=>{
    open('https://t.me/share/url?url=%20&text='+encodeURIComponent(rsvpText()), '_blank');
  });
  mk('📋 Скопіювати', 'var(--sage)', e=>{
    navigator.clipboard?.writeText(rsvpText());
  });
  mk('Готово', '#55515f', ()=>{
    elRsvp.classList.add('hidden');
    elEnd.classList.remove('hidden');
  });
}
document.getElementById('btn-rsvp').addEventListener('click', ()=>{
  rsvp.idx = 0; rsvp.answers = [];
  elEnd.classList.add('hidden');
  elRsvp.classList.remove('hidden');
  rsvpShow();
});

function loop(){ update(); render(); requestAnimationFrame(loop); }
loop();
